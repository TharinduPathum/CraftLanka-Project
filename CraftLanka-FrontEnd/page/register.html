<!DOCTYPE html>
<html>
<head>
  <title>Register</title>

  <style>

    body{
      background:#f3e6d8;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:white;
      padding:40px;
      border-radius:10px;
      width:350px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    input,select{
      width:100%;
      padding:10px;
      margin:10px 0;
    }

    button{
      width:100%;
      padding:10px;
      background:#8a4f2d;
      color:white;
      border:none;
    }

  </style>

</head>

<body>

<div class="box">

  <h2>Create Account</h2>

  <input id="name" placeholder="Full Name">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <select id="role">
    <option value="customer">Customer</option>
    <option value="seller">Seller</option>
  </select>

  <button onclick="register()">Register</button>

</div>

<script>

  function register(){

    let name=document.getElementById("name").value;

    if(name===""){
      alert("Enter name");
      return;
    }

    alert("Account Created");

  }

</script>

</body>
</html>
