<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - CraftLanka</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script type="text/javascript" src="https://www.payhere.lk/lib/payhere.js"></script>

  <style>
    :root {
      --primary-brown: #5d4037;
      --bg-cream: #f9f3ee;
      --text-dark: #4e342e;
      --accent-orange: #e67e22;
      --accent-green: #689f38;
      --card-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
    body {
      background-color: var(--bg-cream);
      color: var(--text-dark);
      padding: 40px 5%;
      background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
    }

    .cart-container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: var(--card-shadow);
    }

    h2 {
      margin-bottom: 30px;
      color: var(--primary-brown);
      display: flex;
      align-items: center;
      gap: 15px;
    }

    /* --- TABLE STYLES --- */
    table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
    th {
      text-align: left;
      padding: 15px;
      border-bottom: 2px solid #f0f0f0;
      color: #8d6e63;
      font-size: 0.85rem;
      text-transform: uppercase;
    }
    td { padding: 20px 15px; border-bottom: 1px solid #eee; }

    .prod-detail { display: flex; align-items: center; gap: 15px; }
    .prod-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
    .prod-name { font-weight: 600; }

    .btn-remove {
      color: #d32f2f; background: #ffebee; border: none;
      padding: 6px 10px; border-radius: 6px; cursor: pointer;
      transition: 0.3s;
    }
    .btn-remove:hover { background: #d32f2f; color: white; }

    /* --- SUMMARY SECTION --- */
    .cart-summary {
      text-align: right;
      border-top: 2px solid var(--bg-cream);
      padding-top: 20px;
    }
    .total-row { font-size: 1.4rem; font-weight: 600; margin-bottom: 25px; }

    /* --- BUTTONS --- */
    .action-group { display: flex; justify-content: flex-end; gap: 15px; }

    button {
      padding: 12px 30px; border-radius: 8px; font-weight: 600;
      cursor: pointer; transition: 0.3s; font-size: 1rem;
    }

    .btn-checkout {
      background: var(--primary-brown); color: white; border: none;
      display: flex; align-items: center; gap: 10px;
    }
    .btn-checkout:hover { background: var(--accent-green); transform: translateY(-2px); }

    .btn-cancel {
      background: none; border: 2px solid #ddd; color: #888;
    }
    .btn-cancel:hover { background: #eee; color: var(--text-dark); border-color: #bbb; }

    /* --- EMPTY STATE --- */
    .empty-msg { text-align: center; padding: 40px 0; color: #aaa; }

    /* Modal Background */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.5);
    }

    /* Modal Box */
    .modal-content {
      background-color: #fff;
      margin: 5% auto;
      padding: 30px;
      border-radius: 12px;
      width: 450px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      position: relative;
    }

    .close-btn {
      position: absolute;
      right: 20px; top: 15px;
      font-size: 24px; cursor: pointer;
    }

    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .form-group input, .form-group textarea {
      width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;
    }

    .pay-now-btn {
      width: 100%;
      padding: 15px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
    }

    .pay-now-btn:hover { background-color: #218838; }
  </style>
</head>

<body>

<div class="cart-container">
  <h2><i class="fas fa-shopping-basket"></i> Your Shopping Basket</h2>

  <table id="cartTable">
    <thead>
    <tr>
      <th>Product</th>
      <th>Price</th>
      <th>Qty</th>
      <th>Subtotal</th>
      <th></th>
    </tr>
    </thead>
    <tbody id="cartItems">
    </tbody>
  </table>

  <div id="emptyCartMessage" class="empty-msg" style="display:none;">
    <i class="fas fa-box-open" style="font-size: 3rem; margin-bottom: 15px; display: block;"></i>
    Your cart is currently empty.
  </div>

  <div class="cart-summary" id="cartSummary">
    <div class="total-row">
      <span>Total: </span>
      <span id="grandTotal" style="color: var(--accent-orange);">LKR 0</span>
    </div>

    <div class="action-group">
      <button class="btn-cancel" onclick="goToProducts()">Cancel & Continue Shopping</button>
      <button class="btn-checkout" onclick="openCheckoutModal()">
        Checkout <i class="fas fa-arrow-right"></i>
      </button>
    </div>
  </div>


</div>

<div id="checkoutModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <h2>Shipping Details</h2>
    <p>Please provide your information for delivery.</p>
    <hr>
    <form id="shippingForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="custName" placeholder="Saman Perera" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="custEmail" placeholder="saman@example.com" required>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="custPhone" placeholder="0771234567" required>
      </div>
      <div class="form-group">
        <label>Delivery Address</label>
        <textarea id="custAddress" rows="3" placeholder="No. 123, Galle Road, Colombo" required></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>City</label>
          <input type="text" id="custCity" placeholder="Colombo" required>
        </div>
      </div>
      <button type="button" class="pay-now-btn" onclick="checkout()">Pay with Card</button>
    </form>
  </div>
</div>

<script>
  // 1. DATA INITIALIZATION
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  function renderCart() {
    const itemsContainer = document.getElementById("cartItems");
    const summary = document.getElementById("cartSummary");
    const emptyMsg = document.getElementById("emptyCartMessage");
    const table = document.getElementById("cartTable");

    if (cart.length === 0) {
      if(table) table.style.display = "none";
      if(summary) summary.style.display = "none";
      if(emptyMsg) emptyMsg.style.display = "block";
      return;
    }

    if(table) table.style.display = "table";
    if(summary) summary.style.display = "block";
    if(emptyMsg) emptyMsg.style.display = "none";

    let total = 0;
    itemsContainer.innerHTML = cart.map((item, index) => {
      const itemPrice = parseFloat(item.price);
      total += itemPrice;
      return `
                <tr>
                    <td>
                        <div class="prod-detail">
                            <img src="${item.imageUrl}" class="prod-img" onerror="this.src='https://via.placeholder.com/60'">
                            <div>
                                <div class="prod-name">${item.name}</div>
                                <div style="font-size:0.7rem; color:#999;">SKU: #00${item.id}</div>
                            </div>
                        </div>
                    </td>
                    <td>LKR ${itemPrice.toLocaleString()}</td>
                    <td>1</td>
                    <td style="font-weight:600;">LKR ${itemPrice.toLocaleString()}</td>
                    <td style="text-align:right;">
                        <button class="btn-remove" onclick="removeItem(${index})">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                </tr>
            `;
    }).join('');

    document.getElementById("grandTotal").innerText = `LKR ${total.toLocaleString()}`;
  }

  function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
  }

  function goToProducts() {
    window.location.href = "products.html";
  }

  // 2. MODAL CONTROL LOGIC
  function openCheckoutModal() {
    if (cart.length === 0) {
      alert("Your cart is empty!");
      return;
    }
    document.getElementById("checkoutModal").style.display = "block";
  }

  function closeModal() {
    document.getElementById("checkoutModal").style.display = "none";
  }

  // 3. ACTUAL CHECKOUT LOGIC (Called from Modal "Pay Now" Button)
  function checkout() {
    const token = localStorage.getItem("token");

    // Get values from the Modal Form
    const name = document.getElementById("custName").value;
    const email = document.getElementById("custEmail").value;
    const phone = document.getElementById("custPhone").value;
    const address = document.getElementById("custAddress").value;
    const city = document.getElementById("custCity").value;

    if(!name || !email || !address || !phone || !city) {
      alert("Please fill in all details for delivery.");
      return;
    }

    // Calculate real total from cart
    let actualTotal = cart.reduce((acc, item) => acc + parseFloat(item.price), 0);
    let itemNames = cart.map(item => item.name).join(', ');

    console.log("Requesting payment hash for LKR " + actualTotal);

    fetch('http://localhost:8080/api/v1/payment/checkout', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({
        totalAmount: actualTotal, // Dynamically sent
        items: itemNames.substring(0, 100) // First 100 characters of items
      })
    })
            .then(response => {
              if (!response.ok) {
                return response.text().then(text => { throw new Error(text); });
              }
              return response.json();
            })
            .then(data => {
              if (!data || !data.hash) throw new Error("Invalid response from server.");

              // 4. PAYHERE OBJECT (Using User Data from Modal)
              var payment = {
                "sandbox": true,
                "merchant_id": data.merchant_id,
                "return_url": "http://localhost:63342/CraftLanka-FrontEnd/success.html",
                "cancel_url": "http://localhost:63342/CraftLanka-FrontEnd/cart.html",
                "notify_url": "https://mustiest-samir-protoplasmatic.ngrok-free.dev/api/v1/payment/notify",
                "order_id": data.order_id,
                "items": "CraftLanka Order #" + data.order_id,
                "amount": data.amount,
                "currency": "LKR",
                "hash": data.hash,
                "first_name": name,
                "last_name": "",
                "email": email,
                "phone": phone,
                "address": address,
                "city": city,
                "country": "Sri Lanka"
              };

              payhere.startPayment(payment);
            })
            .catch(error => {
              console.error("Checkout Failed:", error);
              alert("Checkout Error: " + error.message);
            });
  }

  // 5. PAYHERE RESULT HANDLERS
  payhere.onCompleted = function onCompleted(orderId) {
    console.log("Payment successful for Order ID: " + orderId);
    localStorage.removeItem("cart"); // Clear cart on success
    window.location.href = "success.html";
  };

  payhere.onDismissed = function onDismissed() {
    console.log("Payment window closed");
  };

  payhere.onError = function onError(error) {
    alert("Payment Error: " + error);
  };

  // Close modal when clicking outside of it
  window.onclick = function(event) {
    let modal = document.getElementById("checkoutModal");
    if (event.target == modal) closeModal();
  }

  window.onload = renderCart;
</script>

</body>
</html>
