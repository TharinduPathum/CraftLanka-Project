<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>

    body{
      background:#f3e6d8;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .login-box{
      background:white;
      padding:40px;
      border-radius:10px;
      width:300px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    input{
      width:100%;
      padding:10px;
      margin:10px 0;
    }

    button{
      width:100%;
      padding:10px;
      background:#8a4f2d;
      color:white;
      border:none;
    }

  </style>

</head>

<body>

<div class="login-box">

  <h2>Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

</div>

<script>

  function login(){

    let email=document.getElementById("email").value;
    let pass=document.getElementById("password").value;

    if(email=="" || pass==""){
      alert("Fill all fields");
      return;
    }

    alert("Login Success");

  }

</script>

</body>
</html>
