<!DOCTYPE html>
<html>
<head>
    <title>Customer Dashboard</title>

    <style>

        body{
            font-family:Arial;
            background:#f7efe5;
        }

        .container{
            padding:40px;
        }

        .cards{
            display:flex;
            gap:20px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            width:200px;
            box-shadow:0 3px 8px rgba(0,0,0,0.1);
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Welcome Back</h1>

    <div class="cards">

        <div class="card">
            <h3>Total Orders</h3>
            <p>5</p>
        </div>

        <div class="card">
            <h3>Pending Orders</h3>
            <p>2</p>
        </div>

        <div class="card">
            <h3>Completed</h3>
            <p>3</p>
        </div>

    </div>

</div>

</body>
</html>
