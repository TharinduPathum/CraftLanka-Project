<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Dashboard - CraftLanka</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --sidebar-bg: #5d4037;
      --main-bg: #f9f3ee;
      --text-dark: #4e342e;
      --accent-orange: #e67e22;
      --accent-green: #689f38;
      --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
    body { background-color: var(--main-bg); display: flex; height: 100vh; overflow: hidden; color: var(--text-dark); }

    /* --- SIDEBAR --- */
    .sidebar { width: 260px; background-color: var(--sidebar-bg); color: white; display: flex; flex-direction: column; position: relative; background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png'); }
    .sidebar::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 40%; background: url('https://cdn.pixabay.com/photo/2017/01/31/15/33/mandala-2025109_1280.png') no-repeat bottom left; background-size: contain; opacity: 0.15; pointer-events: none; }
    .logo-section { padding: 30px 20px; display: flex; align-items: center; gap: 10px; font-size: 1.4rem; font-weight: 600; }
    .nav-menu { flex-grow: 1; margin-top: 20px; }
    .nav-item { padding: 15px 25px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.3s; opacity: 0.8; font-size: 0.95rem; text-decoration: none; color: white; }
    .nav-item.active { background: rgba(255, 255, 255, 0.15); opacity: 1; border-left: 5px solid #d4a373; }
    .nav-item:hover { background: rgba(255, 255, 255, 0.1); opacity: 1; }

    /* --- MAIN CONTENT --- */
    .main-content { flex-grow: 1; padding: 30px; overflow-y: auto; background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png'); }

    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .header h1 { font-size: 1.8rem; }

    .add-btn {
      background: var(--accent-green); color: white; border: none;
      padding: 12px 25px; border-radius: 8px; cursor: pointer;
      font-weight: 600; display: flex; align-items: center; gap: 10px; transition: 0.3s;
    }
    .add-btn:hover { background: #558b2f; transform: translateY(-2px); }

    /* --- STATS ROW --- */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; padding: 20px; border-radius: 15px; box-shadow: var(--card-shadow); display: flex; align-items: center; gap: 20px; }
    .stat-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    .stat-info h3 { font-size: 1.4rem; line-height: 1; }
    .stat-info p { font-size: 0.8rem; color: #888; margin-top: 5px; }

    /* --- TABLE AREA --- */
    .content-card { background: white; border-radius: 15px; padding: 25px; box-shadow: var(--card-shadow); min-height: 400px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 15px; border-bottom: 2px solid #f0f0f0; color: #8d6e63; font-size: 0.85rem; text-transform: uppercase; }
    td { padding: 15px; border-bottom: 1px solid #eee; vertical-align: middle; }

    .prod-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; border: 1px solid #eee; }
    .price-tag { font-weight: 600; color: var(--text-dark); }
    .qty-badge { background: #efebe9; padding: 4px 10px; border-radius: 5px; font-size: 0.85rem; }

    .action-btns { display: flex; gap: 10px; }
    .btn-icon { width: 35px; height: 35px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .btn-edit { background: #fff3e0; color: #ef6c00; }
    .btn-delete { background: #ffebee; color: #c62828; }
    .btn-icon:hover { transform: scale(1.1); }

    /* --- EMPTY STATE --- */
    .empty-state { text-align: center; padding: 80px 0; }
    .empty-state i { font-size: 4rem; color: #d7ccc8; margin-bottom: 20px; }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="logo-section"><i class="fas fa-leaf"></i> CraftLanka</div>
  <div class="nav-menu">
    <a href="../index.html" class="nav-item active"><i class="fas fa-home"></i> Home</a>
    <a href="./seller-products.html" class="nav-item"><i class="fas fa-box"></i> Products</a>
    <a href="./seller-orders.html" class="nav-item"><i class="fas fa-shopping-cart"></i> Orders</a>
    <a href="./seller-profile.html" class="nav-item"><i class="fas fa-user-circle"></i> Account</a>
  </div>
</div>

<div class="main-content">
  <div class="header">
    <h1 id="welcomeText">Ayubowan, Seller 👋</h1>
<!--    <button class="add-btn" onclick="goToAddProduct()">-->
<!--      <i class="fas fa-plus"></i> Add Product-->
<!--    </button>-->
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon" style="background: #e3f2fd; color: #1976d2;"><i class="fas fa-boxes"></i></div>
      <div class="stat-info">
        <h3 id="statCount">00</h3>
        <p>Total Products</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background: #e8f5e9; color: #2e7d32;"><i class="fas fa-shopping-bag"></i></div>
      <div class="stat-info">
        <h3>00</h3>
        <p>Orders This Month</p>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background: #fff3e0; color: #ef6c00;"><i class="fas fa-wallet"></i></div>
      <div class="stat-info">
        <h3>LKR 0</h3>
        <p>Total Revenue</p>
      </div>
    </div>
  </div>

  <div class="content-card">
    <table id="productTable" style="display:none;">
      <thead>
      <tr>
        <th>Product Details</th>
        <th>Preview</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Actions</th>
      </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <div id="emptyState" class="empty-state" style="display:none;">
      <i class="fas fa-tools"></i>
      <h3>No Woodcrafts Yet</h3>
      <p>Your shop is empty. Let's add your first masterpiece!</p>
<!--      <button class="add-btn" onclick="goToAddProduct()" style="margin: 20px auto;">Add Product</button>-->
    </div>
  </div>
</div>

<script>
  async function loadProducts() {
    const token = localStorage.getItem("token");
    const table = document.getElementById("productTable");
    const body = document.getElementById("tableBody");
    const empty = document.getElementById("emptyState");
    const statCount = document.getElementById("statCount");

    try {
      const response = await fetch("http://localhost:8080/api/v1/products/my-products", {
        headers: { "Authorization": "Bearer " + token }
      });

      const products = await response.json();

      if (!products || products.length === 0) {
        empty.style.display = "block";
        table.style.display = "none";
        return;
      }

      empty.style.display = "none";
      table.style.display = "table";
      statCount.innerText = products.length;

      let html = "";
      products.forEach(p => {
        html += `
                        <tr>
                            <td style="font-weight: 500;">${p.name}</td>
                            <td><img src="${p.imageUrl}" class="prod-img" onerror="this.src='https://via.placeholder.com/60?text=Wood'"></td>
                            <td class="price-tag">LKR ${p.price.toLocaleString()}</td>
                            <td><span class="qty-badge">${p.quantity} in stock</span></td>
                            <td>
                                <div class="action-btns">
                                    <button class="btn-icon btn-edit" title="Edit"><i class="fas fa-pen"></i></button>
                                    <button class="btn-icon btn-delete" title="Delete"><i class="fas fa-trash"></i></button>
                                </div>
                            </td>
                        </tr>
                    `;
      });

      body.innerHTML = html;

    } catch (err) {
      console.error(err);
      // Optional: redirect to login if unauthorized
      // window.location.href = "login.html";
    }
  }

  function goToAddProduct() {
    window.location.href = "./add-product.html";
  }

  window.onload = loadProducts;
</script>
</body>
</html>
