<!DOCTYPE html>
<html>
<head>
  <title>Seller Dashboard</title>

  <style>

    body{
      font-family:Arial;
      background:#f4efe7;
    }

    .container{
      padding:40px;
    }

    .stats{
      display:flex;
      gap:20px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      width:200px;
      box-shadow:0 3px 8px rgba(0,0,0,0.1);
    }

  </style>

</head>

<body>

<div class="container">

  <h1>Seller Dashboard</h1>

  <div class="stats">

    <div class="card">
      <h3>Total Products</h3>
      <p>12</p>
    </div>

    <div class="card">
      <h3>Total Orders</h3>
      <p>8</p>
    </div>

    <div class="card">
      <h3>Total Sales</h3>
      <p>LKR 35000</p>
    </div>

  </div>

</div>

</body>
</html>
