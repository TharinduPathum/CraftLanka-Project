<!DOCTYPE html>
<html>
<head>
    <title>CraftLanka</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#f6efe6;
        }

        /* HEADER */

        header{
            background:#8a4f2d;
            color:white;
            padding:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav a{
            color:white;
            margin-left:20px;
            text-decoration:none;
            font-weight:bold;
        }

        /* HERO */

        .hero{
            height:350px;
            background:url("https://images.unsplash.com/photo-1616628182505-6c3f3c9a2e2e") center/cover;
            display:flex;
            align-items:center;
            justify-content:center;
            color:white;
            font-size:38px;
            font-weight:bold;
            text-shadow:2px 2px 5px black;
        }

        /* SECTION TITLE */

        .section-title{
            text-align:center;
            margin-top:40px;
            font-size:28px;
            color:#5a321c;
        }

        /* GALLERY */

        .products{
            padding:40px;
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:25px;
            max-width:1100px;
            margin:auto;
        }

        /* IMAGE CARD */

        .card{
            background:white;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 5px 12px rgba(0,0,0,0.1);
            cursor:pointer;
            transition:0.3s;
        }

        .card:hover{
            transform:scale(1.05);
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        .card img{
            width:100%;
            height:230px;
            object-fit:cover;
        }

        /* IMAGE TITLE */

        .card h3{
            text-align:center;
            padding:15px;
            color:#5a321c;
        }

        /* FOOTER */

        footer{
            background:#8a4f2d;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:40px;
        }

    </style>

</head>

<body>

<header>

    <h2>CraftLanka</h2>

    <nav>
        <a href="./page/products.html">Products</a>
        <a href="./page/login.html">Login</a>
        <a href="./page/register.html">Register</a>
    </nav>

</header>

<div class="hero">
    Discover Sri Lankan Wooden Crafts
</div>

<h2 class="section-title">Featured Wooden Handicrafts</h2>

<section class="products">

    <!-- ITEM 1 -->

    <div class="card" onclick="goProducts()">
        <img src="https://images.unsplash.com/photo-1607346256330-dee7af15f7c5">
        <h3>Wooden Elephant</h3>
    </div>

    <!-- ITEM 2 -->

    <div class="card" onclick="goProducts()">
        <img src="https://images.unsplash.com/photo-1616628182505-6c3f3c9a2e2e">
        <h3>Wood Carving Mask</h3>
    </div>

    <!-- ITEM 3 -->

    <div class="card" onclick="goProducts()">
        <img src="https://images.unsplash.com/photo-1592928302636-c83cf1cdbec3">
        <h3>Hand Carved Statue</h3>
    </div>

    <!-- ITEM 4 -->

    <div class="card" onclick="goProducts()">
        <img src="https://images.unsplash.com/photo-1565193566173-7a0ee3dbe261">
        <h3>Wooden Buddha Statue</h3>
    </div>

    <!-- ITEM 5 -->

    <div class="card" onclick="goProducts()">
        <img src="https://images.unsplash.com/photo-1519710164239-da123dc03ef4">
        <h3>Decorative Wood Art</h3>
    </div>

    <!-- ITEM 6 -->

    <div class="card" onclick="goProducts()">
        <img src="https://images.unsplash.com/photo-1581783898377-1c85bf937427">
        <h3>Traditional Wooden Craft</h3>
    </div>

</section>

<footer>
    © 2026 CraftLanka | Sri Lankan Handmade Crafts
</footer>

<script>

    function goProducts(){
        window.location.href="./page/products.html";
    }

    console.log("CraftLanka Home Loaded");

</script>

</body>
</html>
